<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社團列表 - 社團平台</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">⚡ 社團平台</a>
            <ul class="nav-links">
                <li><a href="../index.html">首頁</a></li>
                <li><a href="club-list.html">社團</a></li>
                <li><a href="events.html">活動</a></li>
                <li><a href="qa.html">提問</a></li>
            </ul>
            <div class="nav-right">
                <button id="login-btn" class="btn btn-primary btn-sm" onclick="window.location.href = 'login.html'">登入</button>
                <button id="logout-btn" class="btn btn-secondary btn-sm" onclick="handleLogout()" style="display: none;">登出</button>
                <span id="user-dropdown" style="display: none;"></span>
            </div>
        </nav>
    </header>

    <div id="alert-container"></div>

    <div class="container">
        <h1>社團列表</h1>

        <div class="filter-card" style="margin-bottom: 2rem;">
            <div class="filter-card__header">
                <div class="filter-card__title">篩選社團</div>
                <div class="filter-card__subtitle">先用關鍵字、分類與費用縮小範圍，再用標籤精準定位。</div>
            </div>
            <div class="filter-card__body">
                <div class="filter-grid filter-grid--clubs">
                    <div class="filter-field filter-field-wide">
                        <label for="club-search">社團關鍵字</label>
                        <input id="club-search" type="text" placeholder="輸入社團名稱或描述關鍵字">
                    </div>
                    <div class="filter-field">
                        <label for="category-filter">社團類別</label>
                        <select id="category-filter">
                            <option value="">全部類別</option>
                        </select>
                    </div>
                    <div class="filter-field">
                        <label for="club-filter">社團</label>
                        <select id="club-filter" disabled>
                            <option value="">請先選擇類別</option>
                        </select>
                    </div>
                    <div class="filter-field">
                        <label for="club-fee-range">社費範圍</label>
                        <select id="club-fee-range">
                            <option value="">全部</option>
                            <option value="0-500">0-500元</option>
                            <option value="500-1000">500-1000元</option>
                            <option value="1000+">1000元以上</option>
                        </select>
                    </div>
                </div>
                <div class="filter-toolbar">
                    <div class="filter-toolbar__group">
                        <span class="filter-toolbar__label">熱門標籤</span>
                        <div id="popular-tags-helper" class="filter-hint">多選標籤採 OR 排序：符合較多標籤的社團會排前面，未符合的社團仍會保留在列表。</div>
                        <div id="popular-tags" class="chip-cloud"></div>
                    </div>
                    <div class="filter-toolbar__group subsearch-box">
                        <label for="tag-search-input">標籤副查詢</label>
                        <input id="tag-search-input" type="text" placeholder="輸入標籤關鍵字...">
                        <div id="tag-search-results" class="chip-cloud"></div>
                    </div>
                    <div class="filter-toolbar__actions">
                        <button class="btn btn-primary" onclick="loadClubs()">篩選</button>
                        <button class="btn btn-secondary" onclick="resetFilters()">重製</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="clubs-container" class="grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>載入中...</p>
            </div>
        </div>

        <div id="pagination-container"></div>
    </div>

    <footer>
        <p>&copy; 2026 社團活動資訊統整平台</p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        let currentPage = 1;
        let selectedTagIds = [];
        let categoryData = [];
        let popularTags = [];
        let allTags = [];
        const POPULAR_TAG_LIMIT = 10;

        function getClubUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                search: params.get('search') || '',
                categoryId: params.get('category_id') || '',
                clubId: params.get('club_id') || '',
                minFee: params.get('min_fee') || '',
                maxFee: params.get('max_fee') || '',
                tags: params.get('tags') || ''
            };
        }

        async function loadCategories() {
            try {
                const response = await APIClient.get('clubs.php?action=categories');
                if (!response.success) return;

                categoryData = response.data.categories || [];
                const select = document.getElementById('category-filter');
                categoryData.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.category_id;
                    option.textContent = cat.category_name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadClubsByCategory(categoryId) {
            const clubSelect = document.getElementById('club-filter');
            clubSelect.innerHTML = '';

            if (!categoryId) {
                clubSelect.disabled = true;
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = '請先選擇類別';
                clubSelect.appendChild(placeholder);
                return;
            }

            try {
                const response = await APIClient.get(`clubs.php?action=by_category&category_id=${encodeURIComponent(categoryId)}`);
                if (!response.success) return;

                const clubs = response.data.clubs || [];
                const allOption = document.createElement('option');
                allOption.value = '';
                allOption.textContent = '全部社團';
                clubSelect.appendChild(allOption);

                clubs.forEach(club => {
                    const option = document.createElement('option');
                    option.value = club.club_id;
                    option.textContent = club.club_name;
                    clubSelect.appendChild(option);
                });

                clubSelect.disabled = false;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadPopularTags() {
            try {
                const response = await APIClient.get('clubs.php?action=popular_tags');
                if (!response.success) return;

                popularTags = Array.isArray(response.data.tags) ? response.data.tags : [];
                renderPopularTags();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadAllTags() {
            try {
                const response = await APIClient.get('clubs.php?action=get_all_tags');
                if (!response.success) return;
                allTags = Array.isArray(response.data) ? response.data : [];
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function createTagButton(tag, withUsage = false) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'tag tag-primary';
            btn.style.border = '1px solid var(--primary-color)';
            btn.style.cursor = 'pointer';
            btn.dataset.tagId = tag.tag_id;
            btn.textContent = withUsage
                ? `#${tag.tag_name} (${tag.usage_count || 0})`
                : `#${tag.tag_name}`;

            const id = Number(tag.tag_id);
            const selected = selectedTagIds.includes(id);
            btn.style.backgroundColor = selected ? 'var(--primary-color)' : 'rgba(99, 102, 241, 0.1)';
            btn.style.color = selected ? '#fff' : 'var(--primary-color)';
            btn.classList.toggle('is-selected', selected);

            btn.addEventListener('click', () => {
                if (selectedTagIds.includes(id)) {
                    selectedTagIds = selectedTagIds.filter(t => t !== id);
                } else {
                    selectedTagIds.push(id);
                }
                currentPage = 1;
                renderPopularTags();
                renderTagSearchResults();
                loadClubs();
            });

            return btn;
        }

        function renderPopularTags() {
            const container = document.getElementById('popular-tags');
            const helper = document.getElementById('popular-tags-helper');
            if (!container) return;

            container.innerHTML = '';
            const visible = popularTags.slice(0, POPULAR_TAG_LIMIT);
            visible.forEach(tag => container.appendChild(createTagButton(tag, true)));

            if (helper) {
                helper.textContent = `多選標籤採 OR 排序。熱門標籤僅顯示前 ${POPULAR_TAG_LIMIT} 個，可用下方副查詢找其他標籤。`;
            }
        }

        function renderTagSearchResults() {
            const container = document.getElementById('tag-search-results');
            const input = document.getElementById('tag-search-input');
            if (!container || !input) return;

            const keyword = input.value.trim().toLowerCase();
            container.innerHTML = '';

            if (!keyword) {
                container.innerHTML = '<span style="color: var(--text-light); font-size: 0.82rem;">可用副查詢搜尋未出現在熱門區的標籤</span>';
                return;
            }

            const matched = allTags
                .filter(tag => String(tag.tag_name || '').toLowerCase().includes(keyword))
                .slice(0, 12);

            if (matched.length === 0) {
                container.innerHTML = '<span style="color: var(--text-light); font-size: 0.82rem;">找不到符合的標籤</span>';
                return;
            }

            matched.forEach(tag => container.appendChild(createTagButton(tag, false)));
        }

        async function loadClubs() {
            try {
                currentPage = Math.max(1, currentPage || 1);
                const categoryId = document.getElementById('category-filter').value;
                const clubId = document.getElementById('club-filter').value;
                const search = document.getElementById('club-search').value.trim();
                const feeRange = document.getElementById('club-fee-range').value;
                
                let url = `clubs.php?page=${currentPage}`;
                if (categoryId) url += `&category_id=${categoryId}`;
                if (clubId) url += `&club_id=${clubId}`;
                if (search) url += `&search=${encodeURIComponent(search)}`;
                if (feeRange === '0-500') {
                    url += '&max_fee=500';
                } else if (feeRange === '500-1000') {
                    url += '&min_fee=500&max_fee=1000';
                } else if (feeRange === '1000+') {
                    url += '&min_fee=1000';
                }
                if (selectedTagIds.length > 0) url += `&tags=${selectedTagIds.join(',')}`;
                if (selectedTagIds.length > 0) url += '&tag_match_mode=or';

                const response = await APIClient.get(url);
                if (response.success) {
                    renderClubs(response.data.clubs);
                    renderPagination(response.data.pagination);
                } else {
                    document.getElementById('clubs-container').innerHTML = '<p>載入失敗</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('clubs-container').innerHTML = '<p>發生錯誤</p>';
            }
        }

        function renderClubs(clubs) {
            const container = document.getElementById('clubs-container');
            container.innerHTML = '';

            if (clubs.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">目前無符合此條件的社團，請嘗試其他關鍵字</p>';
                return;
            }

            clubs.forEach(club => {
                const tagHtml = club.tags.map(tag => `<span class="tag tag-primary">#${tag.tag_name}</span>`).join('');
                const logoHtml = PageUtils.renderClubAvatar(club, 64);
                const html = `
                    <div class="card">
                        <div class="card-header" style="display: flex; gap: 1rem; align-items: center; justify-content: space-between;">
                            <div style="flex: 1; min-width: 0;">
                                <h3 style="margin: 0 0 0.5rem 0;">${club.club_name || '-'}</h3>
                                <span class="badge">${club.activity_badge === 'high_active' ? '高活躍' : '活躍中'}</span>
                            </div>
                            ${logoHtml}
                        </div>
                        <div style="margin-bottom: 1rem;">
                            ${tagHtml}
                        </div>
                        <div class="card-body" style="margin-bottom: 1rem; height: 60px; overflow: hidden;">
                            ${club.description}
                        </div>
                        <div style="display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-light); margin-bottom: 1rem;">
                            <span>👥 ${club.member_count} 成員</span>
                            <span>⭐ ${(club.average_rating || 0).toFixed(1)}（${club.reviews_count || 0} 人評分）</span>
                        </div>
                        <a href="club-detail.html?id=${club.club_id}" class="btn btn-primary btn-sm">查看詳情</a>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function renderPagination(pagination) {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';

            if (pagination.total_pages <= 1) return;

            let html = '<div class="pagination">';
            const totalPages = Number(pagination.total_pages) || 0;
            const currentPageNum = Number(pagination.current_page) || 1;
            
            if (currentPageNum > 1) {
                html += `<a onclick="changePage(${currentPageNum - 1})">← 上一頁</a>`;
            }

            // 頁數不多時顯示完整頁碼，避免 6 頁只看見 3 頁的體感問題。
            if (totalPages <= 10) {
                for (let i = 1; i <= totalPages; i++) {
                    if (i === currentPageNum) {
                        html += `<span class="active">${i}</span>`;
                    } else {
                        html += `<a onclick="changePage(${i})">${i}</a>`;
                    }
                }
            } else {
                const pages = new Set([1, totalPages, currentPageNum - 1, currentPageNum, currentPageNum + 1]);
                const validPages = Array.from(pages)
                    .filter(page => page >= 1 && page <= totalPages)
                    .sort((a, b) => a - b);

                let prevPage = 0;
                validPages.forEach(page => {
                    if (prevPage && page - prevPage > 1) {
                        html += '<span>...</span>';
                    }

                    if (page === currentPageNum) {
                        html += `<span class="active">${page}</span>`;
                    } else {
                        html += `<a onclick="changePage(${page})">${page}</a>`;
                    }
                    prevPage = page;
                });
            }

            if (currentPageNum < totalPages) {
                html += `<a onclick="changePage(${currentPageNum + 1})">下一頁 →</a>`;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            loadClubs();
            window.scrollTo(0, 0);
        }

        function resetFilters() {
            document.getElementById('category-filter').value = '';
            const clubSelect = document.getElementById('club-filter');
            clubSelect.disabled = true;
            clubSelect.innerHTML = '<option value="">請先選擇類別</option>';
            document.getElementById('club-search').value = '';
            document.getElementById('club-fee-range').value = '';
            selectedTagIds = [];
            const tagInput = document.getElementById('tag-search-input');
            if (tagInput) tagInput.value = '';
            renderPopularTags();
            renderTagSearchResults();
            currentPage = 1;
            loadClubs();
        }

        document.getElementById('category-filter').addEventListener('change', async () => {
            currentPage = 1;
            await loadClubsByCategory(document.getElementById('category-filter').value);
            loadClubs();
        });

        document.getElementById('club-filter').addEventListener('change', () => {
            currentPage = 1;
            loadClubs();
        });

        document.getElementById('tag-search-input').addEventListener('input', () => {
            renderTagSearchResults();
        });

        document.getElementById('club-search').addEventListener('input', () => {
            currentPage = 1;
            loadClubs();
        });

        document.getElementById('club-fee-range').addEventListener('change', () => {
            currentPage = 1;
            loadClubs();
        });

        async function applyClubFiltersFromUrl() {
            const params = getClubUrlParams();

            document.getElementById('club-search').value = params.search;
            document.getElementById('club-fee-range').value = params.minFee === '1000'
                ? '1000+'
                : (params.minFee === '500' && params.maxFee === '1000'
                    ? '500-1000'
                    : (params.maxFee === '500' ? '0-500' : ''));

            selectedTagIds = params.tags
                ? params.tags.split(',').map(id => Number(id)).filter(id => Number.isInteger(id) && id > 0)
                : [];

            const categorySelect = document.getElementById('category-filter');
            if (params.categoryId) {
                categorySelect.value = params.categoryId;
                await loadClubsByCategory(params.categoryId);
                const clubSelect = document.getElementById('club-filter');
                if (params.clubId) {
                    clubSelect.value = params.clubId;
                }
            }

            renderPopularTags();
            renderTagSearchResults();
        }

        window.addEventListener('DOMContentLoaded', async function() {
            await loadCategories();
            await loadPopularTags();
            await loadAllTags();
            await applyClubFiltersFromUrl();
            loadClubs();
        });
    </script>
</body>

</html>
