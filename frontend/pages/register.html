<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - 社團平台</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <!-- 導航 -->
    <header>
        <nav>
            <a href="../index.html" class="logo">⚡ 社團平台</a>
            <ul class="nav-links">
                <li><a href="../index.html">首頁</a></li>
                <li><a href="club-list.html">社團</a></li>
                <li><a href="events.html">活動</a></li>
                <li><a href="qa.html">提問</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div style="max-width: 500px; margin: 3rem auto;">
            <div class="card">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">建立帳號</h1>
                    <p style="color: var(--text-light);">加入社團平台社群</p>
                </div>

                <div id="alert-container"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="student_id">學號（選填）</label>
                        <input type="text" id="student_id" name="student_id">
                    </div>

                    <div class="form-group">
                        <label for="email">郵箱</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">密碼</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">確認密碼</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">建立帳號</button>
                </form>

                <div style="text-align: center; margin-top: 1.5rem;">
                    <p>已有帳號？<a href="login.html" style="color: var(--primary-color); text-decoration: none;">登入</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const student_id = document.getElementById('student_id').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (!Validator.validateRequired(name)) {
                PageUtils.showAlert('請輸入姓名', 'error');
                return;
            }

            if (!Validator.validateEmail(email)) {
                PageUtils.showAlert('請輸入有效的郵箱', 'error');
                return;
            }

            if (!Validator.validatePassword(password)) {
                PageUtils.showAlert('密碼至少需要6個字符', 'error');
                return;
            }

            if (password !== confirm_password) {
                PageUtils.showAlert('兩次輸入的密碼不一致', 'error');
                return;
            }

            try {
                const response = await APIClient.post('auth.php?action=register', {
                    name,
                    student_id,
                    email,
                    password
                });

                if (response.success) {
                    PageUtils.showAlert('註冊成功，正在重定向…', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);
                } else {
                    PageUtils.showAlert(response.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                PageUtils.showAlert('註冊失敗，請稍後重試', 'error');
            }
        });
    </script>
</body>

</html>
